name: acme

services:
  postgres:
    image: postgres:18-alpine
    container_name: acme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme123
      POSTGRES_DB: acme
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18 expects the mount at /var/lib/postgresql (major-version subdir lives inside). See docker-library/postgres#1259.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
