name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: test-secret-minimum-32-characters-long-for-e2e
      # Use 127.0.0.1 (not localhost) to match playwright.config.ts baseURL.
      # Mismatched hosts split cookie scope: login sets cookies on 127.0.0.1
      # but cross-origin fetches to localhost don't send them, producing 401s
      # on every authed API request from browser tests.
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:push
      - run: pnpm build --filter=web --filter=api --filter=landing
      - name: Get Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install
      # System deps come from apt; Ubuntu mirrors occasionally fail mid-sync
      # ("File has unexpected size... Mirror sync in progress?"). Retry up to
      # 3 times with apt-get update in between to ride out transient mirror flaps.
      - name: Install Playwright system deps
        run: |
          attempt=0
          until pnpm exec playwright install-deps; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 3 ]; then
              echo "playwright install-deps failed after $attempt attempts"
              exit 1
            fi
            echo "apt fetch failed (attempt $attempt); retrying in 30s..."
            sleep 30
            sudo apt-get update || true
          done
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
