name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: e2e-test-secret-minimum-32-characters-long
      BETTER_AUTH_URL: http://localhost:4000
      TRUSTED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:4000
      API_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      FROM_EMAIL: noreply@acme.com
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate
      - run: pnpm db:push
      - name: Build packages
        run: pnpm --filter './packages/*' -r build

      - name: Build API
        working-directory: apps/api
        run: pnpm run build && ls dist/index.mjs

      - name: Get Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers and system deps
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: |
            ~/.cache/ms-playwright
            /var/cache/apt/archives
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: blob-report/
          retention-days: 14
