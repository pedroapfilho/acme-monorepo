name: Lint
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true
      # Type-aware linting resolves generated Prisma client types.
      - run: pnpm turbo db:generate
      - run: pnpm oxlint --format=github .
