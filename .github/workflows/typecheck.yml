name: Typecheck
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true
      - run: pnpm typecheck
